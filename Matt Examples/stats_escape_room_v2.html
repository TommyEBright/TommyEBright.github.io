<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Statistics Arena - Escape Room Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid #00d4ff;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-section {
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 20px;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-size: 0.9em;
            text-transform: uppercase;
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .player-card {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 8px;
            color: #00ffff;
        }

        .player-level {
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .xp-bar {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .xp-fill {
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            height: 100%;
            width: 65%;
        }

        .xp-text {
            font-size: 0.75em;
            color: #b0b0b0;
        }

        .stat-mini {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9em;
            color: #b0b0b0;
        }

        .stat-mini-value {
            color: #00ffff;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            padding: 12px;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 0.95em;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .nav-btn.active {
            border-color: #00ffff;
            color: #00ffff;
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 193, 7, 0.15);
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            color: #ffc107;
            font-weight: bold;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .mode-btn:hover, .mode-btn.active {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
        }

        .content-area {
            display: grid;
            gap: 20px;
        }

        .content-area.hidden {
            display: none;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            background: rgba(0, 212, 255, 0.15);
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.3em;
            color: #00ffff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card-description {
            color: #b0b0b0;
            font-size: 0.95em;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card-stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 5px;
            font-size: 0.85em;
            text-align: center;
        }

        .card-stat-label {
            color: #00d4ff;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .card-stat-value {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.1em;
        }

        .card-footer {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .difficulty-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .difficulty-easy {
            background: #00ff00;
            color: #000;
        }

        .difficulty-medium {
            background: #ffc107;
            color: #000;
        }

        .difficulty-hard {
            background: #ff4444;
            color: #fff;
        }

        .xp-reward {
            margin-left: auto;
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9em;
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .achievement {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .achievement.locked {
            opacity: 0.5;
            border-color: #666;
        }

        .achievement:hover:not(.locked) {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.05);
        }

        .achievement-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .achievement-name {
            font-size: 0.85em;
            color: #00ffff;
            font-weight: bold;
        }

        .achievement-desc {
            font-size: 0.7em;
            color: #b0b0b0;
            margin-top: 8px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #00d4ff;
        }

        .leaderboard-table thead {
            background: rgba(0, 212, 255, 0.2);
        }

        .leaderboard-table th {
            padding: 15px;
            text-align: left;
            color: #00ffff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .leaderboard-table td {
            padding: 12px 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            color: #e0e0e0;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 10px;
        }

        .rank-1 {
            background: #ffd700;
            color: #000;
        }

        .rank-2 {
            background: #c0c0c0;
            color: #000;
        }

        .rank-3 {
            background: #cd7f32;
            color: #fff;
        }

        .rank-other {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .puzzle-container {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-out;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
        }

        .puzzle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 15px;
        }

        .puzzle-title {
            font-size: 1.8em;
            color: #00ffff;
        }

        .puzzle-number {
            background: #00d4ff;
            color: #0f3460;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .puzzle-content {
            margin-bottom: 30px;
        }

        .puzzle-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 153, 255, 0.1));
            border: 2px solid #00d4ff;
            color: #e0e0e0;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
        }

        .choice-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 153, 255, 0.3));
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .choice-btn.correct {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border-color: #00ff00;
            animation: pulse 0.5s ease;
        }

        .choice-btn.incorrect {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            border-color: #ff4444;
            animation: shake 0.4s ease;
        }

        .feedback {
            min-height: 40px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feedback.success {
            background: rgba(0, 255, 0, 0.15);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .feedback.error {
            background: rgba(255, 68, 68, 0.15);
            border: 2px solid #ff4444;
            color: #ff6666;
        }

        .feedback.hidden {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        .next-btn {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .hidden {
            display: none !important;
        }

        .game-over {
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #00ffff;
        }

        .xp-earned {
            font-size: 1.5em;
            color: #00ffff;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
        }

        .final-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .final-stat {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 10px;
        }

        .final-stat-label {
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .final-stat-value {
            font-size: 2.5em;
            color: #00ffff;
            font-weight: bold;
        }

        .new-achievement-unlock {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            animation: slideUp 0.5s ease;
        }

        .new-achievement-unlock h3 {
            color: #ffc107;
            margin-bottom: 10px;
        }

        .new-achievement-unlock .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 900px) {
            .game-wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid #00d4ff;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 20px;
            }

            .sidebar-section {
                border-bottom: none;
                padding-bottom: 0;
            }

            .main-content {
                padding: 20px;
                max-height: none;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .puzzle-container {
                padding: 20px;
            }

            .buttons-container {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class='game-wrapper'>
        <!-- SIDEBAR -->
        <div class='sidebar'>
            <!-- Player Card -->
            <div class='sidebar-section'>
                <div class='player-card'>
                    <div class='player-avatar' id='avatar'>🧠</div>
                    <div class='player-name' id='playerName'>Scholar</div>
                    <div class='player-level' id='playerLevel'>Level 1</div>
                    <div class='xp-bar'>
                        <div class='xp-fill' id='xpFill' style='width: 30%;'></div>
                    </div>
                    <div class='xp-text' id='xpText'>30/100 XP</div>
                </div>
            </div>

            <!-- Stats -->
            <div class='sidebar-section'>
                <div class='sidebar-title'>📊 Stats</div>
                <div class='stat-mini'>
                    <span>Puzzles Solved</span>
                    <span class='stat-mini-value' id='puzzlesSolved'>0</span>
                </div>
                <div class='stat-mini'>
                    <span>Total Score</span>
                    <span class='stat-mini-value' id='totalScore'>0</span>
                </div>
                <div class='stat-mini'>
                    <span>Accuracy</span>
                    <span class='stat-mini-value' id='totalAccuracy'>—</span>
                </div>
            </div>

            <!-- Daily Streak -->
            <div class='sidebar-section'>
                <div class='streak-display'>
                    🔥 <span id='streak'>0</span> Day Streak
                </div>
            </div>

            <!-- Navigation -->
            <div class='sidebar-section'>
                <div class='sidebar-title'>🎮 Menu</div>
                <div class='nav-buttons'>
                    <button class='nav-btn active' onclick='showMode("home")'>🏠 Home</button>
                    <button class='nav-btn' onclick='showMode("daily")'>⚡ Daily Challenge</button>
                    <button class='nav-btn' onclick='showMode("leaderboard")'>🏆 Leaderboard</button>
                    <button class='nav-btn' onclick='showMode("achievements")'>🎖️ Achievements</button>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class='main-content'>
            <!-- HOME MODE -->
            <div id='mode-home' class='content-area'>
                <div class='header'>
                    <div>
                        <h1>📚 Statistics Arena</h1>
                        <p style='color: #b0b0b0; margin-top: 5px;'>Master statistical concepts and climb the leaderboard</p>
                    </div>
                    <div class='mode-selector' id='modeSelector'></div>
                </div>

                <div style='margin-bottom: 30px;'>
                    <h2 style='color: #00ffff; margin-bottom: 20px;'>🎯 Available Challenges</h2>
                    <div class='card-grid' id='homeCards'></div>
                </div>
            </div>

            <!-- DAILY CHALLENGE MODE -->
            <div id='mode-daily' class='content-area hidden'>
                <div class='header'>
                    <h1>⚡ Daily Challenge</h1>
                </div>
                <div id='dailyContent'></div>
            </div>

            <!-- LEADERBOARD MODE -->
            <div id='mode-leaderboard' class='content-area hidden'>
                <div class='header'>
                    <h1>🏆 Global Leaderboard</h1>
                </div>
                <div style='background: rgba(255,255,255,0.08); border: 2px solid #00d4ff; border-radius: 15px; padding: 20px;'>
                    <table class='leaderboard-table'>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Level</th>
                                <th>Total XP</th>
                                <th>Puzzles Solved</th>
                            </tr>
                        </thead>
                        <tbody id='leaderboardBody'></tbody>
                    </table>
                </div>
            </div>

            <!-- ACHIEVEMENTS MODE -->
            <div id='mode-achievements' class='content-area hidden'>
                <div class='header'>
                    <h1>🎖️ Achievements</h1>
                </div>
                <div class='achievement-grid' id='achievementsGrid'></div>
            </div>

            <!-- GAME AREA (hidden until puzzle starts) -->
            <div id='game-area' class='hidden'></div>
            <div id='game-over-screen' class='hidden'></div>
        </div>
    </div>

    <script>
        const gameState = {
            // Player progression
            playerName: 'Scholar',
            level: 1,
            currentXP: 30,
            maxXP: 100,
            totalXP: 30,
            streak: 3,
            puzzlesSolved: 5,
            totalScore: 250,
            
            // Game tracking
            currentPuzzle: 0,
            score: 0,
            attempts: 0,
            correct: 0,
            startTime: null,
            completed: false,
            currentMode: 'home',
            selectedChallenge: null,
            hintsUsed: 0,
            
            // Unlocked achievements
            unlockedAchievements: ['first_blood', 'perfect_match', 'speedrun'],
            newUnlocks: []
        };

        const challenges = [
            {
                id: 'escape-standard',
                title: 'Standard Escape',
                description: 'Master the fundamentals of statistics',
                icon: '🔐',
                difficulty: 'easy',
                xpReward: 100,
                puzzleCount: 5,
                puzzleType: 'escape'
            },
            {
                id: 'escape-advanced',
                title: 'Advanced Escape',
                description: 'Test your statistical expertise',
                icon: '🔓',
                difficulty: 'hard',
                xpReward: 250,
                puzzleCount: 8,
                puzzleType: 'escape'
            },
            {
                id: 'hypothesis-battle',
                title: 'Hypothesis Battle Royale',
                description: 'Answer questions rapidly - last one standing wins',
                icon: '⚔️',
                difficulty: 'medium',
                xpReward: 150,
                puzzleCount: 10,
                puzzleType: 'battle-royale'
            },
            {
                id: 'concept-matching',
                title: 'Concept Matching',
                description: 'Connect definitions to statistical terms',
                icon: '🔗',
                difficulty: 'easy',
                xpReward: 80,
                puzzleCount: 6,
                puzzleType: 'matching'
            }
        ];

        const achievements = [
            { id: 'first_blood', icon: '🩸', name: 'First Blood', desc: 'Complete your first puzzle' },
            { id: 'perfect_match', icon: '💯', name: 'Perfect Match', desc: 'Get 100% on a challenge' },
            { id: 'speedrun', icon: '⚡', name: 'Speedrun Master', desc: 'Complete a challenge in under 2 minutes' },
            { id: 'no_hints', icon: '🧠', name: 'Brain Power', desc: 'Complete without using hints' },
            { id: 'streak_7', icon: '🔥', name: 'On Fire', desc: 'Maintain a 7-day streak' },
            { id: 'level_5', icon: '📈', name: 'Rising Scholar', desc: 'Reach Level 5' },
            { id: 'leaderboard_top10', icon: '🏅', name: 'Top 10', desc: 'Reach top 10 leaderboard' },
            { id: 'perfect_accuracy', icon: '🎯', name: 'Bullseye', desc: 'Maintain 95%+ accuracy' }
        ];

        const puzzles = [
            {
                type: 'multiple-choice',
                title: 'P-Value Basics',
                text: 'A researcher reports p = 0.03 for their study. Which interpretation is correct?',
                options: [
                    { text: 'There\'s a 3% probability the null hypothesis is true', correct: false },
                    { text: 'There\'s a 3% chance of observing this data if the null hypothesis were true', correct: true },
                    { text: 'The result is definitely significant and important', correct: false },
                    { text: 'We can accept the null hypothesis', correct: false }
                ],
                hint: 'Think about what p-value measures: the probability of the DATA given the null hypothesis is true.',
                points: 10
            },
            {
                type: 'multiple-choice',
                title: 'Type I Error',
                text: 'What is a Type I error?',
                options: [
                    { text: 'Rejecting a true null hypothesis (false positive)', correct: true },
                    { text: 'Failing to reject a false null hypothesis', correct: false },
                    { text: 'Using the wrong test', correct: false },
                    { text: 'A computational mistake', correct: false }
                ],
                hint: 'Type I = False Positive (rejecting when we shouldn\'t)',
                points: 10
            },
            {
                type: 'multiple-choice',
                title: 'Confidence Intervals',
                text: 'What does a 95% CI really mean?',
                options: [
                    { text: '95% of data values lie in the interval', correct: false },
                    { text: 'The true parameter is definitely in the interval', correct: false },
                    { text: 'Repeated sampling would capture the true parameter 95% of the time', correct: true },
                    { text: '95% chance the null hypothesis is true', correct: false }
                ],
                hint: 'CIs describe long-run behavior of estimation, not probability of truth.',
                points: 10
            }
        ];

        function initGame() {
            renderSidebar();
            renderHomeMode();
            renderModeSelector();
        }

        function renderSidebar() {
            const xpPercent = (gameState.currentXP / gameState.maxXP) * 100;
            document.getElementById('xpFill').style.width = xpPercent + '%';
            document.getElementById('xpText').textContent = gameState.currentXP + '/' + gameState.maxXP + ' XP';
            document.getElementById('playerName').textContent = gameState.playerName;
            document.getElementById('playerLevel').textContent = 'Level ' + gameState.level;
            document.getElementById('streak').textContent = gameState.streak;
            document.getElementById('puzzlesSolved').textContent = gameState.puzzlesSolved;
            document.getElementById('totalScore').textContent = gameState.totalScore;
            
            const accuracy = gameState.puzzlesSolved > 0 ? Math.round((gameState.puzzlesSolved / 50) * 100) : '—';
            document.getElementById('totalAccuracy').textContent = accuracy === '—' ? '—' : accuracy + '%';
        }

        function renderModeSelector() {
            const selector = document.getElementById('modeSelector');
            selector.innerHTML = '';
            challenges.slice(0, 3).forEach(challenge => {
                const btn = document.createElement('button');
                btn.className = 'mode-btn';
                btn.textContent = challenge.title;
                btn.onclick = () => startChallenge(challenge);
                selector.appendChild(btn);
            });
        }

        function renderHomeMode() {
            const homeCards = document.getElementById('homeCards');
            homeCards.innerHTML = '';

            challenges.forEach(challenge => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class='card-icon'>${challenge.icon}</div>
                    <div class='card-title'>${challenge.title}</div>
                    <div class='card-description'>${challenge.description}</div>
                    <div class='card-stats'>
                        <div class='card-stat'>
                            <div class='card-stat-label'>Puzzles</div>
                            <div class='card-stat-value'>${challenge.puzzleCount}</div>
                        </div>
                        <div class='card-stat'>
                            <div class='card-stat-label'>XP Reward</div>
                            <div class='card-stat-value'>+${challenge.xpReward}</div>
                        </div>
                    </div>
                    <div class='card-footer'>
                        <span class='difficulty-badge difficulty-${challenge.difficulty}'>${challenge.difficulty}</span>
                        <span class='xp-reward'>⭐ ${challenge.xpReward} XP</span>
                    </div>
                `;
                card.onclick = () => startChallenge(challenge);
                homeCards.appendChild(card);
            });
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            // Mock leaderboard data
            const leaderboardData = [
                { rank: 1, name: 'StatsMaster', level: 12, xp: 8450, puzzles: 128 },
                { rank: 2, name: 'Scholar', level: gameState.level, xp: gameState.totalXP, puzzles: gameState.puzzlesSolved },
                { rank: 3, name: 'DataWizard', level: 10, xp: 7320, puzzles: 105 },
                { rank: 4, name: 'HypothesesHero', level: 9, xp: 6800, puzzles: 92 },
                { rank: 5, name: 'DistributionDon', level: 8, xp: 5900, puzzles: 78 }
            ];

            leaderboardData.forEach(entry => {
                const tr = document.createElement('tr');
                const rankClass = entry.rank <= 3 ? 'rank-' + entry.rank : 'rank-other';
                tr.innerHTML = `
                    <td><span class='rank-badge ${rankClass}'>${entry.rank}</span></td>
                    <td><strong>${entry.name}</strong></td>
                    <td>${entry.level}</td>
                    <td>${entry.xp.toLocaleString()}</td>
                    <td>${entry.puzzles}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderAchievements() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';

            achievements.forEach(ach => {
                const isUnlocked = gameState.unlockedAchievements.includes(ach.id);
                const div = document.createElement('div');
                div.className = 'achievement' + (isUnlocked ? '' : ' locked');
                div.innerHTML = `
                    <div class='achievement-icon'>${ach.icon}</div>
                    <div class='achievement-name'>${ach.name}</div>
                    <div class='achievement-desc'>${ach.desc}</div>
                `;
                grid.appendChild(div);
            });
        }

        function showMode(mode) {
            // Hide all modes
            document.querySelectorAll('.content-area').forEach(el => el.classList.add('hidden'));
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');

            // Show selected mode
            document.getElementById('mode-' + mode).classList.remove('hidden');
            gameState.currentMode = mode;

            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Render mode-specific content
            if (mode === 'leaderboard') {
                renderLeaderboard();
            } else if (mode === 'achievements') {
                renderAchievements();
            }
        }

        function startChallenge(challenge) {
            gameState.selectedChallenge = challenge;
            gameState.currentPuzzle = 0;
            gameState.score = 0;
            gameState.attempts = 0;
            gameState.correct = 0;
            gameState.hintsUsed = 0;
            gameState.startTime = Date.now();
            gameState.newUnlocks = [];

            // Hide home, show game area
            document.querySelectorAll('.content-area').forEach(el => el.classList.add('hidden'));
            document.getElementById('game-area').classList.remove('hidden');

            showPuzzle(0);
        }

        function showPuzzle(index) {
            if (index >= puzzles.length) {
                endChallenge();
                return;
            }

            gameState.currentPuzzle = index;
            const puzzle = puzzles[index];
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';

            const container = document.createElement('div');
            container.className = 'puzzle-container';

            const header = document.createElement('div');
            header.className = 'puzzle-header';
            header.innerHTML = `
                <div>
                    <h2 class='puzzle-title'>${puzzle.title}</h2>
                </div>
                <div class='puzzle-number'>${index + 1}/${puzzles.length}</div>
            `;
            container.appendChild(header);

            const content = document.createElement('div');
            content.className = 'puzzle-content';

            const text = document.createElement('p');
            text.className = 'puzzle-text';
            text.textContent = puzzle.text;
            content.appendChild(text);

            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'buttons-container';

            puzzle.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = option.text;
                btn.onclick = () => checkAnswer(option.correct, btn, puzzle);
                buttonsDiv.appendChild(btn);
            });

            content.appendChild(buttonsDiv);
            container.appendChild(content);

            const feedback = document.createElement('div');
            feedback.id = 'feedback';
            feedback.className = 'feedback hidden';
            container.appendChild(feedback);

            const hintBtn = document.createElement('button');
            hintBtn.className = 'action-btn submit-btn';
            hintBtn.textContent = '💡 Hint (' + (3 - gameState.hintsUsed) + '/3)';
            hintBtn.onclick = () => showHint(puzzle, hintBtn);
            hintBtn.style.marginTop = '20px';
            container.appendChild(hintBtn);

            gameArea.appendChild(container);
        }

        function checkAnswer(correct, btn, puzzle) {
            gameState.attempts++;
            const feedback = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);

            if (correct) {
                gameState.correct++;
                gameState.score += puzzle.points;
                btn.classList.add('correct');
                feedback.classList.remove('hidden', 'error');
                feedback.classList.add('success');
                feedback.innerHTML = '✅ Correct! +' + puzzle.points + ' points';
                setTimeout(() => showPuzzle(gameState.currentPuzzle + 1), 1500);
            } else {
                btn.classList.add('incorrect');
                feedback.classList.remove('hidden', 'success');
                feedback.classList.add('error');
                feedback.innerHTML = '❌ Incorrect. Try again!';
                setTimeout(() => {
                    buttons.forEach(b => b.disabled = false);
                }, 1000);
            }
        }

        function showHint(puzzle, btn) {
            if (gameState.hintsUsed >= 3) {
                alert('No more hints available!');
                return;
            }
            gameState.hintsUsed++;
            btn.disabled = true;
            btn.textContent = '💡 Hint (' + (3 - gameState.hintsUsed) + '/3)';
            
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden', 'error');
            feedback.classList.add('success');
            feedback.innerHTML = '💭 Hint: ' + puzzle.hint;
        }

        function endChallenge() {
            gameState.completed = true;
            const challengeXP = gameState.selectedChallenge.xpReward;
            const bonusXP = gameState.correct === puzzles.length ? 50 : 0;
            const totalEarnedXP = challengeXP + bonusXP;

            // Update player stats
            gameState.currentXP += totalEarnedXP;
            gameState.totalXP += totalEarnedXP;
            gameState.totalScore += gameState.score;
            gameState.puzzlesSolved += gameState.correct;

            // Level up check
            if (gameState.currentXP >= gameState.maxXP) {
                gameState.currentXP -= gameState.maxXP;
                gameState.level++;
                gameState.newUnlocks.push('level_up');
            }

            // Check achievements
            if (gameState.correct === puzzles.length && !gameState.unlockedAchievements.includes('perfect_match')) {
                gameState.newUnlocks.push('perfect_match');
                gameState.unlockedAchievements.push('perfect_match');
            }

            const gameOverScreen = document.getElementById('game-over-screen');
            const gameArea = document.getElementById('game-area');

            gameArea.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');

            const percentage = Math.round((gameState.score / (puzzles.length * 10)) * 100);

            let message = percentage === 100 ? '🏆 PERFECT!' : percentage >= 80 ? '⭐ EXCELLENT!' : '✨ GOOD JOB!';

            let achievementHTML = '';
            if (gameState.newUnlocks.length > 0) {
                achievementHTML = `
                    <div class='new-achievement-unlock'>
                        <div class='icon'>🎉</div>
                        <h3>NEW ACHIEVEMENT UNLOCKED!</h3>
                        <p>${gameState.newUnlocks[0]}</p>
                    </div>
                `;
            }

            gameOverScreen.innerHTML = `
                <div class='puzzle-container game-over'>
                    <h2>${message}</h2>
                    <div class='xp-earned'>
                        <strong>+${totalEarnedXP} XP EARNED!</strong><br>
                        ${bonusXP > 0 ? `<small>+${bonusXP} Bonus XP for perfect score!</small>` : ''}
                    </div>
                    ${achievementHTML}
                    <div class='final-stats'>
                        <div class='final-stat'>
                            <div class='final-stat-label'>Challenge Score</div>
                            <div class='final-stat-value'>${gameState.score}/${puzzles.length * 10}</div>
                        </div>
                        <div class='final-stat'>
                            <div class='final-stat-label'>Accuracy</div>
                            <div class='final-stat-value'>${percentage}%</div>
                        </div>
                        <div class='final-stat'>
                            <div class='final-stat-label'>Level</div>
                            <div class='final-stat-value'>${gameState.level}</div>
                        </div>
                        <div class='final-stat'>
                            <div class='final-stat-label'>Total XP</div>
                            <div class='final-stat-value'>${gameState.totalXP}</div>
                        </div>
                    </div>
                    <div class='action-buttons' style='margin-top: 30px;'>
                        <button class='action-btn next-btn' onclick='backToHome()'>← Back to Home</button>
                        <button class='action-btn submit-btn' onclick='startChallenge(gameState.selectedChallenge)'>Play Again</button>
                    </div>
                </div>
            `;

            renderSidebar();
        }

        function backToHome() {
            gameState.currentMode = 'home';
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('mode-home').classList.remove('hidden');
        }

        window.addEventListener('load', initGame);
    </script>
</body>
</html>
